name: Build Android APK

on:
  workflow_dispatch: # Ejecutar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: restsys-cellphone/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependencias
        working-directory: restsys-cellphone
        run: npm ci

      - name: Build APK
        working-directory: restsys-cellphone
        run: eas build --local --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: restsys-cellphone.apk
          path: restsys-cellphone/*.apk
          retention-days: 7
